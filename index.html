<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectHub — Gerenciador de Projetos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F172A;
  --surface:#1E293B;
  --surface2:#263347;
  --border:#334155;
  --border2:#475569;
  --text:#F1F5F9;
  --text2:#94A3B8;
  --text3:#64748B;
  --indigo:#6366F1;
  --indigo-dim:#4F46E5;
  --emerald:#10B981;
  --blue:#3B82F6;
  --red:#EF4444;
  --orange:#F97316;
  --yellow:#EAB308;
  --slate:#64748B;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 4px 24px rgba(0,0,0,.35);
  --sidebar-w:240px;
  --sidebar-collapsed:64px;
  --transition:.18s ease;
}
html{height:100%;scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  display:flex;
  font-size:14px;
  line-height:1.5;
  overflow:hidden;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ===== SIDEBAR ===== */
#sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:fixed;
  left:0;top:0;
  z-index:100;
  overflow:hidden;
}
.sidebar-header{
  padding:20px 16px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--border);
  min-height:64px;
}
.sidebar-logo{
  width:34px;height:34px;
  background:var(--indigo);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;flex-shrink:0;
  color:#fff;
}
.sidebar-title{font-weight:700;font-size:15px;white-space:nowrap}
.sidebar-sub{font-size:11px;color:var(--text3);white-space:nowrap}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--text2);
  text-decoration:none;
  transition:all var(--transition);
  white-space:nowrap;margin-bottom:2px;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--indigo)}
.nav-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.nav-label{font-size:13px;font-weight:500}
.nav-section{
  font-size:10px;font-weight:600;letter-spacing:.08em;
  color:var(--text3);padding:16px 10px 6px;
  text-transform:uppercase;white-space:nowrap;
}

/* ===== MAIN ===== */
#main{
  margin-left:var(--sidebar-w);
  flex:1;
  height:100vh;
  overflow-y:auto;
  display:flex;flex-direction:column;
}

/* ===== TOPBAR ===== */
#topbar{
  height:64px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 24px;position:sticky;top:0;z-index:50;
}
#topbar h1{font-size:17px;font-weight:600;flex:1}
.topbar-actions{display:flex;gap:8px}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;border:none;transition:all var(--transition);
  text-decoration:none;
}
.btn-primary{background:var(--indigo);color:#fff}
.btn-primary:hover{background:var(--indigo-dim)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;aspect-ratio:1}

/* ===== PAGE ===== */
#page{flex:1;padding:24px;max-width:1440px;width:100%}

/* ===== CARDS ===== */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
}
.card-sm{padding:14px 16px}

/* ===== GRID ===== */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.ga{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}

/* ===== BADGES ===== */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;
}
.badge-todo{background:rgba(100,116,139,.2);color:#94A3B8}
.badge-doing{background:rgba(59,130,246,.2);color:#60A5FA}
.badge-blocked{background:rgba(239,68,68,.2);color:#F87171}
.badge-done{background:rgba(16,185,129,.2);color:#34D399}
.badge-low{background:rgba(16,185,129,.15);color:#34D399}
.badge-medium{background:rgba(234,179,8,.15);color:#FBBF24}
.badge-high{background:rgba(249,115,22,.15);color:#FB923C}
.badge-urgent{background:rgba(239,68,68,.15);color:#F87171;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ===== SKELETON ===== */
.skeleton{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:var(--radius-sm);
}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.sk-text{height:14px;margin:6px 0}
.sk-card{height:80px}

/* ===== DASHBOARD ===== */
.stat-card{
  display:flex;align-items:center;gap:14px;
  padding:18px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.stat-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:2px}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ===== PROJECT CARD ===== */
.project-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  cursor:pointer;transition:all var(--transition);
  position:relative;overflow:hidden;
}
.project-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:var(--proj-color,var(--indigo));
}
.project-card:hover{border-color:var(--indigo);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.proj-name{font-weight:600;font-size:15px;margin-bottom:4px}
.proj-desc{font-size:12px;color:var(--text2);margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.progress-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:var(--indigo);border-radius:99px;transition:width .3s}
.proj-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.proj-meta span{font-size:11px;color:var(--text3)}
.avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--indigo);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
}

/* ===== KANBAN ===== */
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px}
.kanban-col{
  min-width:260px;max-width:280px;
  background:var(--surface2);
  border-radius:var(--radius);
  padding:12px;
  flex-shrink:0;
}
.kanban-col-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;font-weight:600;font-size:13px;
}
.col-count{
  background:var(--border);border-radius:99px;
  padding:1px 7px;font-size:11px;color:var(--text2);
}
.kanban-col.drag-over{background:rgba(99,102,241,.08);border:2px dashed var(--indigo)}
.task-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:8px;
  cursor:grab;transition:all var(--transition);
}
.task-card:hover{border-color:var(--border2);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.task-card.dragging{opacity:.4;cursor:grabbing}
.task-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.task-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.task-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--text3)}
.due-chip{font-size:10px;color:var(--text3);margin-left:auto;display:flex;align-items:center;gap:3px}
.due-chip.overdue{color:var(--red)}
.due-chip.soon{color:var(--yellow)}
.comment-count{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-left:4px}

/* ===== TABLE ===== */
.data-table{width:100%;border-collapse:collapse}
.data-table th{
  padding:10px 12px;text-align:left;font-size:11px;
  font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.05em;border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.data-table th:hover{color:var(--text)}
.data-table td{
  padding:11px 12px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text2);
}
.data-table tr:hover td{background:var(--surface2)}
.data-table tr:last-child td{border-bottom:none}

/* ===== MODAL ===== */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal-backdrop.hidden{display:none}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow);
}
.modal-lg{max-width:800px}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-title{font-weight:700;font-size:16px}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--text2);
  padding:6px;border-radius:6px;transition:all var(--transition);
  font-size:18px;
}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
  position:sticky;bottom:0;background:var(--surface);
}

/* ===== FORM ===== */
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:9px 12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;
  transition:border-color var(--transition);outline:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--indigo)}
.form-select option{background:var(--surface)}
.form-textarea{resize:vertical;min-height:80px}

/* ===== TABS ===== */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{
  padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all var(--transition);
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--indigo);border-bottom-color:var(--indigo)}

/* ===== TOAST ===== */
#toast-container{
  position:fixed;bottom:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow);font-size:13px;min-width:240px;
  animation:slideIn .2s ease;
}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{border-left:3px solid var(--emerald)}
.toast-error{border-left:3px solid var(--red)}
.toast-info{border-left:3px solid var(--indigo)}

/* ===== TIMELINE / GANTT ===== */
.gantt-wrap{overflow-x:auto}
.gantt-row{display:flex;align-items:center;margin-bottom:8px;gap:12px;min-height:32px}
.gantt-label{width:180px;flex-shrink:0;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;background:var(--surface2);border-radius:4px;height:20px;position:relative}
.gantt-bar{height:100%;border-radius:4px;background:var(--indigo);position:absolute;transition:all .3s}

/* ===== COMMENTS ===== */
.comment-item{display:flex;gap:10px;margin-bottom:14px}
.comment-body{flex:1;background:var(--surface2);border-radius:8px;padding:10px 12px}
.comment-author{font-size:12px;font-weight:600;margin-bottom:3px}
.comment-text{font-size:13px;color:var(--text2)}
.comment-time{font-size:11px;color:var(--text3);margin-top:4px}

/* ===== FILTERS ===== */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-select{
  padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text2);font-size:12px;
  font-family:'Inter',sans-serif;outline:none;cursor:pointer;
}
.filter-select:focus{border-color:var(--indigo)}
.search-input{
  padding:7px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:13px;
  font-family:'Inter',sans-serif;outline:none;
}
.search-input:focus{border-color:var(--indigo)}

/* ===== CHIP INPUT ===== */
.chip-wrap{display:flex;flex-wrap:wrap;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;align-items:center;min-height:38px}
.chip{background:rgba(99,102,241,.2);color:var(--indigo);border-radius:4px;padding:2px 8px;font-size:12px;display:flex;align-items:center;gap:4px}
.chip-x{cursor:pointer;font-size:14px;line-height:1}
.chip-wrap input{border:none;background:transparent;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;flex:1;min-width:80px}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty p{font-size:13px}

/* ===== COLOR PICKER ===== */
.color-options{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all var(--transition);
}
.color-opt.selected,.color-opt:hover{transform:scale(1.15);border-color:var(--text)}

/* ===== MEMBER CARD ===== */
.member-card{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
}
.member-info{flex:1}
.member-name{font-weight:600;font-size:14px}
.member-role{font-size:12px;color:var(--text3)}
.avatar-lg{width:40px;height:40px;font-size:14px}

/* ===== PROJECT DETAIL ===== */
.detail-header{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:20px;
  border-top:4px solid var(--proj-color,var(--indigo));
}
.detail-title{font-size:22px;font-weight:700;margin-bottom:6px}
.detail-desc{font-size:13px;color:var(--text2);margin-bottom:14px}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.detail-meta-item{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}

/* ===== SETTINGS ===== */
.settings-section{margin-bottom:28px}
.settings-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .g4,.g3,.g2{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:600px){
  .g4,.g3,.g2{grid-template-columns:1fr}
  #sidebar{width:60px}
  #sidebar .nav-label,.sidebar-title,.sidebar-sub{display:none}
  #main{margin-left:60px}
  #page{padding:16px}
}

/* ===== MISC ===== */
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--text3)}
.text-sm{font-size:12px}
.mt-auto{margin-top:auto}
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}
.justify-between{justify-content:space-between}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.mr-1{margin-right:4px}
.w-full{width:100%}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.font-semibold{font-weight:600}
.hidden{display:none !important}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">P</div>
    <div>
      <div class="sidebar-title">ProjectHub</div>
      <div class="sidebar-sub">Gerenciador</div>
    </div>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="#dashboard" data-page="dashboard">
      <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
    </a>
    <a class="nav-item" href="#projects" data-page="projects">
      <span class="nav-icon">📁</span><span class="nav-label">Projetos</span>
    </a>
    <div class="nav-section">Gestão</div>
    <a class="nav-item" href="#team" data-page="team">
      <span class="nav-icon">👥</span><span class="nav-label">Equipe</span>
    </a>
    <div class="nav-section">Sistema</div>
    <a class="nav-item" href="#settings" data-page="settings">
      <span class="nav-icon">⚙️</span><span class="nav-label">Configurações</span>
    </a>
  </nav>
</aside>

<!-- ===== MAIN ===== -->
<div id="main">
  <header id="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-actions" id="topbar-actions"></div>
  </header>
  <div id="page"></div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-backdrop hidden" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="e=>e.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer hidden" id="modal-footer"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast-container"></div>

<script>
// ============================================================
// CONFIGURAÇÃO E ESTADO GLOBAL
// ============================================================
const APP = {
  apiUrl: localStorage.getItem('api_url') || '',
  cache: {},
  currentPage: '',
  currentProject: null,
  currentTab: 'kanban',
  team: [],
  sortCol: '',
  sortDir: 1,
  chipTags: [],
  charts: {}
};

// ============================================================
// API
// Apps Script publicado como "Anyone" retorna CORS headers corretos.
// Solução definitiva: todas as chamadas via GET simples.
// Para operações de escrita, o payload vai como parâmetro 'payload' na URL.
// Isso evita qualquer preflight OPTIONS que o Apps Script não suporta.
// ============================================================
function checkUrl() {
  if (!APP.apiUrl) {
    showToast('Configure a URL do Apps Script em Configurações ⚙️','error');
    throw new Error('URL não configurada');
  }
}

async function apiGet(action, params = {}) {
  checkUrl();
  const url = new URL(APP.apiUrl);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const ckey = action + JSON.stringify(params);
  try {
    const r = await fetch(url.toString(), { redirect: 'follow' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    if (json && json.success === false) throw new Error(json.message || 'Erro na API');
    const data = json && json.data !== undefined ? json.data : json;
    APP.cache[ckey] = data;
    return data;
  } catch(e) {
    if (APP.cache[ckey]) { showToast('Offline — usando cache local','info'); return APP.cache[ckey]; }
    throw e;
  }
}

async function apiPost(action, body = {}) {
  checkUrl();
  // Envia tudo via GET com payload JSON codificado na URL.
  // O doGet do Apps Script detecta 'payload' e processa como escrita.
  const url = new URL(APP.apiUrl);
  url.searchParams.set('action', action);
  url.searchParams.set('payload', JSON.stringify({ action, ...body }));
  const r = await fetch(url.toString(), { redirect: 'follow' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  if (json && json.success === false) throw new Error(json.message || 'Erro na API');
  return json && json.data !== undefined ? json.data : json;
}

function navigate(hash) {
  if (!hash) hash = '#dashboard';
  window.location.hash = hash;
}

async function router() {
  const hash = window.location.hash || '#dashboard';
  const parts = hash.replace('#','').split('/');
  const page = parts[0];
  const id = parts[1];

  document.querySelectorAll('.nav-item').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });

  APP.currentPage = page;
  const pageEl = document.getElementById('page');
  const titleEl = document.getElementById('page-title');
  const actionsEl = document.getElementById('topbar-actions');
  actionsEl.innerHTML = '';

  // Destroy previous charts
  Object.values(APP.charts).forEach(c => { try { c.destroy(); } catch(_){} });
  APP.charts = {};

  switch(page) {
    case 'dashboard': titleEl.textContent = 'Dashboard'; await renderDashboard(pageEl); break;
    case 'projects':  titleEl.textContent = 'Projetos';
      actionsEl.innerHTML = `<button class="btn btn-primary" onclick="openProjectModal()">+ Novo Projeto</button>`;
      await renderProjects(pageEl); break;
    case 'project':
      if (id) await renderProjectDetail(pageEl, id, titleEl, actionsEl);
      break;
    case 'team':      titleEl.textContent = 'Equipe';
      actionsEl.innerHTML = `<button class="btn btn-primary" onclick="openMemberModal()">+ Novo Membro</button>`;
      await renderTeam(pageEl); break;
    case 'settings':  titleEl.textContent = 'Configurações'; renderSettings(pageEl); break;
    default: titleEl.textContent = 'Dashboard'; await renderDashboard(pageEl); break;
  }
}

// ============================================================
// HELPERS
// ============================================================
function statusBadge(s) {
  const map = { 'A Fazer':'todo','Em Andamento':'doing','Bloqueado':'blocked','Concluído':'done' };
  return `<span class="badge badge-${map[s]||'todo'}">${s}</span>`;
}
function priorityBadge(p) {
  const map = { 'Baixa':'low','Média':'medium','Alta':'high','Urgente':'urgent' };
  return `<span class="badge badge-${map[p]||'medium'}">${p}</span>`;
}
function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('pt-BR'); } catch(_){ return d; }
}
function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : name.substr(0,2).toUpperCase();
}
function avatarHtml(name, color, size='') {
  return `<div class="avatar ${size}" style="background:${color||'var(--indigo)'}" title="${name||''}">${initials(name)}</div>`;
}
function skeleton(n=3) {
  return Array(n).fill('<div class="skeleton sk-card mb-2"></div>').join('');
}
function dueDateChip(d) {
  if (!d) return '';
  const days = daysUntil(d);
  let cls = '';
  if (days < 0) cls = 'overdue';
  else if (days <= 3) cls = 'soon';
  const txt = days < 0 ? `${Math.abs(days)}d atraso` : days === 0 ? 'Hoje' : `${days}d`;
  return `<span class="due-chip ${cls}">📅 ${txt}</span>`;
}

// ============================================================
// CHIP INPUT
// ============================================================
function initChipInput(input) {
  const wrap = input.closest('.chip-wrap');
  if (!wrap) return;
  input.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
      e.preventDefault();
      addChip(wrap, input.value.trim());
      input.value = '';
    }
    if (e.key === 'Backspace' && !input.value && APP.chipTags.length) {
      const last = wrap.querySelector('.chip:last-of-type');
      if (last) { APP.chipTags.pop(); last.remove(); }
    }
  });
}
function addChip(wrap, text) {
  APP.chipTags.push(text);
  const chip = document.createElement('span');
  chip.className = 'chip';
  chip.innerHTML = `${text}<span class="chip-x" onclick="this.parentElement.remove();APP.chipTags.splice(APP.chipTags.indexOf('${text}'),1)">×</span>`;
  wrap.insertBefore(chip, wrap.querySelector('input'));
}

async function renderProjects(el) {
  el.innerHTML = `<div class="filters"><div class="skeleton" style="height:32px;width:200px"></div></div><div class="grid ga">${skeleton(6)}</div>`;
  try {

  }
}

function renderProjectsGrid(el, projects) {
  let statusFilter = '', priorityFilter = '', searchFilter = '';
  const update = () => {
    let filtered = projects;
    if (statusFilter) filtered = filtered.filter(p => p.status === statusFilter);
    if (priorityFilter) filtered = filtered.filter(p => p.priority === priorityFilter);
    if (searchFilter) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchFilter.toLowerCase()));
    const grid = el.querySelector('#proj-grid');
    if (!grid) return;
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><h3>Nenhum projeto encontrado</h3><p>Tente outros filtros ou crie um novo projeto</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => projectCardHtml(p)).join('');
  };

  el.innerHTML = `
    <div class="filters">
      <input class="search-input" placeholder="🔍 Buscar projetos..." oninput="searchFilter=this.value;update()">
      <select class="filter-select" onchange="statusFilter=this.value;update()">
        <option value="">Todos os status</option>
        <option>A Fazer</option><option>Em Andamento</option><option>Concluído</option><option>Arquivado</option>
      </select>
      <select class="filter-select" onchange="priorityFilter=this.value;update()">
        <option value="">Todas as prioridades</option>
        <option>Baixa</option><option>Média</option><option>Alta</option><option>Urgente</option>
      </select>
    </div>
    <div class="grid ga" id="proj-grid">
      ${projects.map(p => projectCardHtml(p)).join('') || `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><h3>Nenhum projeto ainda</h3><p>Clique em "+ Novo Projeto" para começar</p></div>`}
    </div>`;

  // Hoist para closures funcionar
  window.statusFilter = ''; window.priorityFilter = ''; window.searchFilter = '';
  window.update = update;
  el.querySelector('.search-input').addEventListener('input', function(){ window.searchFilter=this.value; window.update(); });
  el.querySelector('.filter-select').addEventListener('change', function(){ window.statusFilter=this.value; window.update(); });
  el.querySelectorAll('.filter-select')[1].addEventListener('change', function(){ window.priorityFilter=this.value; window.update(); });
}

function projectCardHtml(p) {
  const color = p.color || '#6366F1';
  const tasks = APP.cache['getTasksProj_'+p.id] || [];
  const done = tasks.filter(t=>t.status==='Concluído').length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : (p.progress || 0);
  return `
  <div class="project-card" style="--proj-color:${color}" onclick="navigate('#project/${p.id}')">
    <div class="flex items-center justify-between mb-2">
      ${statusBadge(p.status)} ${priorityBadge(p.priority)}
    </div>
    <div class="proj-name">${p.name}</div>
    <div class="proj-desc">${p.description || 'Sem descrição'}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="proj-meta">
      ${avatarHtml(p.owner, color)}
      <span>${p.owner || 'Sem responsável'}</span>
      <span style="margin-left:auto">📅 ${formatDate(p.dueDate)}</span>
      <span>${pct}%</span>
    </div>
    <div class="flex gap-2 mt-3" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-sm" onclick="openProjectModal('${p.id}')">✏️ Editar</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDelete('project','${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑️</button>

async function saveProject(editId) {
  const body = {
    name: document.getElementById('p-name').value.trim(),
    description: document.getElementById('p-desc').value.trim(),
    status: document.getElementById('p-status').value,
    priority: document.getElementById('p-priority').value,
    startDate: document.getElementById('p-start').value,
    dueDate: document.getElementById('p-due').value,
    owner: document.getElementById('p-owner').value.trim(),
    color: document.getElementById('p-color').value
  };
  if (!body.name) { showToast('Nome é obrigatório','error'); return; }
  try {
    if (editId) { body.id = editId; await apiPost('updateProject', body); showToast('Projeto atualizado','success'); }
    else { await apiPost('createProject', body); showToast('Projeto criado','success'); }
    document.getElementById('modal-backdrop').classList.add('hidden');
    delete APP.cache['getProjects{}'];
    await renderProjects(document.getElementById('page'));
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

function confirmDelete(type, id, name) {
  openModal('Confirmar exclusão',
    `<p>Deseja excluir <strong>"${name}"</strong>? Esta ação não pode ser desfeita.</p>`,
    `<button class="btn btn-ghost" onclick="closeModal({})">Cancelar</button>
     <button class="btn btn-danger" onclick="doDelete('${type}','${id}')">🗑️ Excluir</button>`);
}

async function doDelete(type, id) {
  const actions = { project:'deleteProject', task:'deleteTask', comment:'deleteComment', member:'deleteMember' };
  try {
    await apiPost(actions[type], { id });
    showToast('Excluído com sucesso','success');
    document.getElementById('modal-backdrop').classList.add('hidden');
    if (type === 'project') { delete APP.cache['getProjects{}']; navigate('#projects'); }
    else if (type === 'task' && APP.currentProject) loadProjectDetail(APP.currentProject);
    else if (type === 'member') { delete APP.cache['getTeam{}']; renderTeam(document.getElementById('page')); }
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}
window.doDelete = doDelete;

// KANBAN
// ============================================================
const COLUMNS = ['A Fazer','Em Andamento','Bloqueado','Concluído'];
const COL_COLORS = { 'A Fazer':'#64748B','Em Andamento':'#3B82F6','Bloqueado':'#EF4444','Concluído':'#10B981' };

function renderKanban(el, tasks, proj) {
  el.innerHTML = `<div class="kanban-board">${COLUMNS.map(col => {
    const colTasks = tasks.filter(t => t.status === col);
    return `<div class="kanban-col" id="col-${col.replace(/\s/g,'_')}" data-status="${col}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropTask(event,'${col}')">
      <div class="kanban-col-header">
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${COL_COLORS[col]}"></span>
          ${col}
        </span>
        <span class="col-count">${colTasks.length}</span>
      </div>
      ${colTasks.map(t => taskCardHtml(t)).join('')}
      <button class="btn btn-ghost btn-sm w-full mt-1" style="justify-content:center" onclick="openTaskModal(null,'${proj.id}','${col}')">+ Adicionar</button>
    </div>`;
  }).join('')}</div>`;
}

function taskCardHtml(t) {
  const assignee = APP.team.find(m => m.name === t.assignee);
  const commCount = t._commentCount || APP.cache['commentCount_'+t.id] || 0;
  return `<div class="task-card" draggable="true" id="task-${t.id}"
    draggable="true"
    ondragstart="dragTask(event,'${t.id}')"
    ondragend="this.classList.remove('dragging')"
    onclick="openTaskDetail('${t.id}')">
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      ${priorityBadge(t.priority)}
      <span style="margin-left:auto;cursor:pointer" onclick="event.stopPropagation();quickComplete('${t.id}','${t.status}')" title="${t.status==='Concluído'?'Reabrir':'Marcar concluída'}">
        ${t.status==='Concluído'?'☑':'☐'}
      </span>
    </div>
    <div class="task-title">${t.title}</div>
    <div class="task-footer">
      ${assignee ? avatarHtml(assignee.name,'') : ''}
      ${t.tags ? t.tags.split(',').filter(Boolean).slice(0,2).map(tag=>`<span class="task-tag">${tag.trim()}</span>`).join('') : ''}
      ${dueDateChip(t.dueDate)}
      ${commCount ? `<span class="comment-count">💬 ${commCount}</span>` : ''}
    </div>
  </div>`;
}

function dragTask(e, id) {
  e.dataTransfer.setData('taskId', id);
  document.getElementById('task-'+id).classList.add('dragging');
}

async function dropTask(e, status) {
  e.preventDefault();
  const col = e.currentTarget;
  col.classList.remove('drag-over');
  const id = e.dataTransfer.getData('taskId');
  const task = APP._projTasks.find(t => t.id == id);
  if (!task || task.status === status) return;
  task.status = status;
  try {
    await apiPost('moveTask', { id, status });
    showToast('Tarefa movida','success');
    loadProjectDetail(APP.currentProject);
  } catch(err) { showToast('Erro ao mover: '+err.message,'error'); }
}

async function quickComplete(id, currentStatus) {
  const newStatus = currentStatus === 'Concluído' ? 'A Fazer' : 'Concluído';
  try {
    await apiPost('moveTask', { id, status: newStatus });
    loadProjectDetail(APP.currentProject);
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}
window.quickComplete = quickComplete;

function renderTaskList(el, tasks) {
  if (!tasks.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Nenhuma tarefa</h3><p>Crie a primeira tarefa no Kanban</p></div>`; return; }
  let sorted = [...tasks], sortCol = '', sortDir = 1;
  const thead = ['Título','Status','Prioridade','Responsável','Prazo','Horas Est.'];
  const rerender = () => {
    const tbody = el.querySelector('#task-tbody');
    if (!tbody) return;
    tbody.innerHTML = sorted.map(t=>`
      <tr style="cursor:pointer" onclick="openTaskDetail('${t.id}')">
        <td><span class="font-semibold">${t.title}</span></td>
        <td>${statusBadge(t.status)}</td>
        <td>${priorityBadge(t.priority)}</td>
        <td>${t.assignee||'—'}</td>
        <td>${formatDate(t.dueDate)}</td>
        <td>${t.estimatedHours||0}h</td>
      </tr>`).join('');
  };
  el.innerHTML = `<div class="card" style="padding:0;overflow:hidden"><table class="data-table">
    <thead><tr>${thead.map((h,i)=>`<th onclick="sortList(${i})">${h}</th>`).join('')}</tr></thead>
    <tbody id="task-tbody"></tbody>
  </table></div>`;
  rerender();
  window.sortList = (col) => {
    const keys = ['title','status','priority','assignee','dueDate','estimatedHours'];
    if (sortCol === keys[col]) sortDir *= -1; else { sortCol = keys[col]; sortDir = 1; }
    sorted.sort((a,b) => String(a[sortCol]||'').localeCompare(String(b[sortCol]||'')) * sortDir);
    rerender();
  };
}

// ============================================================
// TIMELINE / GANTT
// ============================================================
function renderTimeline(el, tasks) {
  const withDates = tasks.filter(t => t.dueDate);
  if (!withDates.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><h3>Sem datas definidas</h3><p>Adicione prazos às tarefas para ver a timeline</p></div>`; return; }
  const dates = withDates.map(t => new Date(t.dueDate));
  const minD = new Date(Math.min(...dates));
  const maxD = new Date(Math.max(...dates));
  const span = Math.max((maxD - minD) / 86400000, 1);

  el.innerHTML = `<div class="card"><div class="mb-3 font-semibold">📅 Gantt — ${formatDate(minD)} → ${formatDate(maxD)}</div>
    <div class="gantt-wrap">${withDates.map(t => {
      const due = new Date(t.dueDate);
      const start = t.startDate ? new Date(t.startDate) : new Date(due.getTime() - 2*86400000);
      const left = Math.max(0, (start - minD) / 86400000 / span * 100);
      const width = Math.max(1, (due - start) / 86400000 / span * 100);
      const color = COL_COLORS[t.status] || '#6366F1';
      return `<div class="gantt-row">
        <div class="gantt-label" title="${t.title}">${t.title}</div>
        <div class="gantt-track">
          <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${color}" title="${t.title} — ${formatDate(t.dueDate)}"></div>
        </div>
      </div>`;
    }).join('')}</div></div>`;
}

  COLUMNS.forEach(c => byStatus[c] = tasks.filter(t=>t.status===c).length);

  const actH = tasks.reduce((s,t)=>s+(+t.actualHours||0),0);
  el.innerHTML = `

      ${COLUMNS.map(col=>`
        <div class="stat-card">
          <div class="stat-icon" style="background:${COL_COLORS[col]}22">
            ${col==='A Fazer'?'📋':col==='Em Andamento'?'⚡':col==='Bloqueado'?'🚫':'✅'}
          </div>
          <div>
            <div class="stat-label">${col}</div>
            <div class="stat-value">${byStatus[col]||0}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="grid g2">
      <div class="card">
        <div class="mb-3 font-semibold">⏱️ Horas</div>
        <canvas id="chart-hours" height="200"></canvas>
      </div>
      <div class="card">
        <div class="mb-3 font-semibold">📈 Métricas</div>

          <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${byStatus['Concluído']&&tasks.length?Math.round(byStatus['Concluído']/tasks.length*100):0}%"></div></div>
          <div class="text-muted text-sm mt-1">${byStatus['Concluído']||0} de ${tasks.length} tarefas concluídas</div>
        </div>
        <div><div class="stat-label mb-1">Horas: Estimado vs Realizado</div>
          <p class="text-sm text-muted">Estimado: <strong style="color:var(--text)">${estH}h</strong> · Realizado: <strong style="color:var(--indigo)">${actH}h</strong></p>
        </div>
      </div>
    </div>`;
  const ctx = document.getElementById('chart-hours');
  if (ctx) {
    APP.charts.hours = new Chart(ctx, {
      type:'bar',
      data:{
        labels: tasks.slice(0,8).map(t=>t.title.substr(0,18)),
        datasets:[
          { label:'Estimado', data:tasks.slice(0,8).map(t=>t.estimatedHours||0), backgroundColor:'rgba(99,102,241,.5)', borderRadius:4 },
          { label:'Realizado', data:tasks.slice(0,8).map(t=>t.actualHours||0), backgroundColor:'rgba(16,185,129,.5)', borderRadius:4 }
        ]
      },
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#94A3B8',font:{size:11}}}},
        scales:{x:{ticks:{color:'#64748B',font:{size:10}},grid:{color:'#1E293B'}},y:{ticks:{color:'#64748B'},grid:{color:'#334155'}}}
      }
    });
  }
}

async function saveTask(editId, projectId) {
  const chips = Array.from(document.querySelectorAll('#chip-wrap .chip')).map(c=>c.textContent.replace('×','').trim());
  const body = {
    title: document.getElementById('t-title').value.trim(),
    description: document.getElementById('t-desc').value.trim(),
    status: document.getElementById('t-status').value,
    priority: document.getElementById('t-priority').value,
    assignee: document.getElementById('t-assignee').value,
    dueDate: document.getElementById('t-due').value,
    estimatedHours: document.getElementById('t-est').value,
    actualHours: document.getElementById('t-act').value,
    tags: chips.join(','),
    projectId: projectId || APP.currentProject
  };
  if (!body.title) { showToast('Título é obrigatório','error'); return; }
  try {
    if (editId) { body.id = editId; await apiPost('updateTask', body); showToast('Tarefa atualizada','success'); }
    else { await apiPost('createTask', body); showToast('Tarefa criada','success'); }
    document.getElementById('modal-backdrop').classList.add('hidden');
    loadProjectDetail(body.projectId);
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}
window.saveTask = saveTask;
